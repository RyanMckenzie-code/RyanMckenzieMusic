<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ryan McKenzie Music</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Shadows+Into+Light&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>

    <header class="site-header">
      <button class="hamburger" aria-label="Open navigation" aria-expanded="false" aria-controls="nav-menu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="nav-menu" class="menu" aria-label="Main navigation">
        <a href="#home">Home</a>
        <a href="#shows">Shows</a>
        <a href="#contact">Contact</a>
        <a href="#epk">EPK</a>
      </nav>
    </header>

    <main id="home" class="hero">
      <h1>Ryan McKenzie</h1>
      <p class="tagline">Live • Acoustic • Storytelling</p>
      <figure class="silhouette-wrap">
        <img src="assets/silhouette.svg" alt="Ryan seated with guitar in silhouette" class="silhouette" />
      </figure>
      <p class="note">Base site ready to expand.</p>
    </main>

    <section id="shows" class="panel">
      <h2>Shows</h2>
      <p>Upcoming dates and ticket links will go here.</p>
    </section>

    <section id="contact" class="panel">
      <h2>Contact</h2>
      <p>Booking and press contact details will go here.</p>
    </section>

    <section id="epk" class="panel">
      <h2>EPK</h2>
      <p>Electronic press kit downloads and links will live here.</p>
    </section>

    <script src="script.js"></script>
  </body>
</html>
